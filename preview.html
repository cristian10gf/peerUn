<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PeerEval Dúo — Propuesta 2</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0F172A; font-family: 'Outfit', 'Segoe UI', sans-serif; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ========================
    // TEACHER APP COLORS
    // ========================
    const TC = {
      primary: "#1E3A5F",
      primaryLight: "#2E5080",
      accent: "#C9A84C",
      accentLight: "#E8C96A",
      success: "#22C55E",
      warning: "#F59E0B",
      danger: "#EF4444",
      bg: "#F0F4F8",
      surface: "#FFFFFF",
      surfaceAlt: "#EAF0F7",
      text: "#0F2138",
      textMid: "#4A6080",
      textLight: "#94A3B8",
      border: "#D0DCE8",
    };

    // ========================
    // STUDENT APP COLORS
    // ========================
    const SC = {
      primary: "#059669",
      primaryLight: "#10B981",
      accent: "#6366F1",
      accentLight: "#818CF8",
      success: "#22C55E",
      warning: "#F59E0B",
      danger: "#EF4444",
      bg: "#F0FDF8",
      surface: "#FFFFFF",
      surfaceAlt: "#ECFDF5",
      text: "#064E3B",
      textMid: "#065F46",
      textLight: "#6EE7B7",
      border: "#A7F3D0",
    };

    // ========================
    // SHARED MICRO-COMPONENTS
    // ========================
    const StatusBar = ({ dark, bg }) => (
      <div style={{
        height: 44, display: "flex", alignItems: "center",
        justifyContent: "space-between", padding: "0 24px",
        background: bg || "transparent",
        color: dark ? "#fff" : TC.text, flexShrink: 0,
      }}>
        <span style={{ fontSize: 13, fontWeight: 700 }}>9:41</span>
        <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
          <span style={{ fontSize: 12 }}>●●●</span>
          <span style={{ fontSize: 11, fontWeight: 700 }}>100%</span>
        </div>
      </div>
    );

    const TCard = ({ children, style, onClick }) => (
      <div onClick={onClick} style={{
        background: TC.surface, borderRadius: 18, padding: 16,
        boxShadow: "0 2px 14px rgba(30,58,95,0.08)",
        border: `1px solid ${TC.border}`, ...style,
        cursor: onClick ? "pointer" : "default",
      }}>{children}</div>
    );

    const SCard = ({ children, style, onClick }) => (
      <div onClick={onClick} style={{
        background: SC.surface, borderRadius: 18, padding: 16,
        boxShadow: "0 2px 14px rgba(5,150,105,0.08)",
        border: `1px solid ${SC.border}`, ...style,
        cursor: onClick ? "pointer" : "default",
      }}>{children}</div>
    );

    const TBtn = ({ label, onClick, full, outline, small }) => (
      <button onClick={onClick} style={{
        background: outline ? "transparent" : `linear-gradient(135deg, ${TC.primary}, ${TC.primaryLight})`,
        color: outline ? TC.primary : "#fff",
        border: outline ? `2px solid ${TC.primary}` : "none",
        borderRadius: 14, padding: small ? "9px 16px" : "14px 20px",
        fontSize: small ? 12 : 14, fontWeight: 700, cursor: "pointer",
        width: full ? "100%" : "auto",
        boxShadow: outline ? "none" : "0 4px 16px rgba(30,58,95,0.3)",
      }}>{label}</button>
    );

    const SBtn = ({ label, onClick, full, outline, small }) => (
      <button onClick={onClick} style={{
        background: outline ? "transparent" : `linear-gradient(135deg, ${SC.primary}, ${SC.primaryLight})`,
        color: outline ? SC.primary : "#fff",
        border: outline ? `2px solid ${SC.primary}` : "none",
        borderRadius: 14, padding: small ? "9px 16px" : "14px 20px",
        fontSize: small ? 12 : 14, fontWeight: 700, cursor: "pointer",
        width: full ? "100%" : "auto",
        boxShadow: outline ? "none" : "0 4px 16px rgba(5,150,105,0.3)",
      }}>{label}</button>
    );

    const CriterionBar = ({ label, value, color }) => (
      <div style={{ marginBottom: 10 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
          <span style={{ fontSize: 12, fontWeight: 600, color: TC.textMid }}>{label}</span>
          <span style={{ fontSize: 12, fontWeight: 800, color }}>{value}</span>
        </div>
        <div style={{ background: TC.border, borderRadius: 99, height: 6 }}>
          <div style={{ height: 6, borderRadius: 99, background: color, width: `${((value - 2) / 3) * 100}%`, transition: "width 0.6s" }} />
        </div>
      </div>
    );

    const phoneStyle = (colors) => ({
      width: 360,
      height: 740,
      background: colors.bg,
      borderRadius: 40,
      overflow: "hidden",
      display: "flex",
      flexDirection: "column",
      fontFamily: "'Outfit', 'Segoe UI', sans-serif",
      position: "relative",
      flexShrink: 0,
    });

    const scrollable = { flex: 1, overflowY: "auto", scrollbarWidth: "none" };

    // ============================================================
    // TEACHER APP SCREENS
    // ============================================================

    const TLoginScreen = ({ navigate }) => (
      <div style={{ ...phoneStyle(TC), background: `linear-gradient(165deg, ${TC.primary} 0%, #0D2540 100%)` }}>
        <StatusBar dark />
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "0 28px 40px" }}>
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
            <div style={{
              width: 90, height: 90, borderRadius: 28,
              background: `linear-gradient(135deg, ${TC.accent}, ${TC.accentLight})`,
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 42, marginBottom: 20,
              boxShadow: `0 12px 40px ${TC.accent}60`,
            }}>👨‍🏫</div>
            <div style={{ fontSize: 30, fontWeight: 900, color: "#fff", letterSpacing: -0.5 }}>PeerEval</div>
            <div style={{
              background: TC.accent, color: TC.primary, borderRadius: 8,
              padding: "3px 12px", fontSize: 11, fontWeight: 900, letterSpacing: 1.5,
              marginTop: 6, marginBottom: 4,
            }}>TEACHER</div>
            <div style={{ fontSize: 13, color: "rgba(255,255,255,0.5)" }}>Panel de docente</div>
          </div>

          <div style={{
            background: "rgba(255,255,255,0.08)", backdropFilter: "blur(20px)",
            borderRadius: 24, padding: 24, border: "1px solid rgba(255,255,255,0.15)",
          }}>
            <div style={{ color: "#fff", fontWeight: 800, fontSize: 18, marginBottom: 18 }}>Acceso docente — Roble</div>
            {["Usuario institucional", "Contraseña"].map(label => (
              <div key={label} style={{ marginBottom: 14 }}>
                <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 11, marginBottom: 6, fontWeight: 600 }}>{label}</div>
                <div style={{
                  padding: "12px 14px", borderRadius: 12,
                  background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.2)",
                  color: label === "Contraseña" ? "rgba(255,255,255,0.5)" : "#fff", fontSize: 14,
                }}>
                  {label === "Contraseña" ? "••••••••" : "amartinez@universidad.edu"}
                </div>
              </div>
            ))}
            <div style={{
              background: `linear-gradient(135deg, ${TC.accent}, ${TC.accentLight})`,
              color: TC.primary, border: "none", borderRadius: 14,
              padding: "14px 0", fontSize: 14, fontWeight: 800, cursor: "pointer",
              width: "100%", textAlign: "center", marginTop: 4,
              boxShadow: `0 6px 20px ${TC.accent}50`,
            }} onClick={() => navigate("tDashboard")}>Iniciar sesión →</div>
            <div style={{ textAlign: "center", color: "rgba(255,255,255,0.35)", fontSize: 10, marginTop: 12 }}>
              Verificado como DOCENTE por Roble SSO
            </div>
          </div>
        </div>
      </div>
    );

    const TDashboardScreen = ({ navigate }) => (
      <div style={{ ...phoneStyle(TC) }}>
        <div style={{ background: `linear-gradient(135deg, ${TC.primary}, ${TC.primaryLight})` }}>
          <StatusBar dark />
          <div style={{ padding: "8px 20px 20px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ color: "rgba(255,255,255,0.65)", fontSize: 12 }}>Panel docente</div>
                <div style={{ color: "#fff", fontSize: 21, fontWeight: 900 }}>Prof. Andrés M. 👋</div>
              </div>
              <div style={{
                width: 42, height: 42, borderRadius: 14,
                background: TC.accent, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20,
              }}>🏆</div>
            </div>
            <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
              {[["2", "Cursos"], ["1", "Activa"], ["20", "Grupos"]].map(([v, l]) => (
                <div key={l} style={{
                  flex: 1, background: "rgba(255,255,255,0.12)", borderRadius: 14,
                  padding: "10px 0", textAlign: "center", border: "1px solid rgba(255,255,255,0.18)",
                }}>
                  <div style={{ color: "#fff", fontWeight: 900, fontSize: 20 }}>{v}</div>
                  <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 10 }}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        </div>

        <div style={{ ...scrollable, padding: "14px 16px" }}>
          <div style={{
            background: `linear-gradient(135deg, ${TC.accent}22, ${TC.accent}11)`,
            border: `1.5px solid ${TC.accent}50`, borderRadius: 18,
            padding: 16, marginBottom: 16, cursor: "pointer",
          }} onClick={() => navigate("tResults")}>
            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
              <span style={{ fontSize: 26 }}>⏳</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 800, fontSize: 13, color: TC.text }}>Evaluación Semana 6 — Activa</div>
                <div style={{ fontSize: 11, color: TC.textMid }}>18/40 completadas · Cierra en 14h</div>
              </div>
              <span style={{ fontSize: 18 }}>→</span>
            </div>
            <div style={{ background: TC.border, borderRadius: 99, height: 5, marginTop: 10 }}>
              <div style={{ height: 5, borderRadius: 99, background: TC.accent, width: "45%" }} />
            </div>
          </div>

          <div style={{ fontWeight: 800, fontSize: 15, color: TC.text, marginBottom: 12 }}>Mis cursos</div>
          {[
            { name: "Gestión de Proyectos 2026-10", groups: 10, code: "GP2610" },
            { name: "Desarrollo de Software", groups: 8, code: "DS2610" },
          ].map(c => (
            <TCard key={c.code} style={{ marginBottom: 12 }}>
              <div style={{ fontWeight: 800, fontSize: 14, color: TC.text }}>{c.name}</div>
              <div style={{ fontSize: 12, color: TC.textMid, marginTop: 3 }}>{c.groups} grupos · {c.code}</div>
              <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                <button onClick={() => navigate("tGroupImport")} style={{
                  flex: 1, background: TC.surfaceAlt, color: TC.primary,
                  border: `1px solid ${TC.border}`, borderRadius: 12, padding: "9px 0",
                  fontSize: 11, fontWeight: 700, cursor: "pointer",
                }}>🔗 Grupos</button>
                <button onClick={() => navigate("tNewAssessment")} style={{
                  flex: 1, background: TC.primary, color: "#fff",
                  border: "none", borderRadius: 12, padding: "9px 0",
                  fontSize: 11, fontWeight: 700, cursor: "pointer",
                }}>+ Evaluación</button>
                <button onClick={() => navigate("tResults")} style={{
                  flex: 1, background: `${TC.accent}20`, color: TC.accent,
                  border: `1px solid ${TC.accent}40`, borderRadius: 12, padding: "9px 0",
                  fontSize: 11, fontWeight: 700, cursor: "pointer",
                }}>📊 Ver</button>
              </div>
            </TCard>
          ))}
        </div>

        <div style={{ display: "flex", background: TC.surface, borderTop: `1px solid ${TC.border}`, padding: "8px 0 18px" }}>
          {[["🏠", "Inicio", true], ["📝", "Evaluar", false, "tNewAssessment"], ["📊", "Resultados", false, "tResults"], ["⚙️", "Ajustes", false]].map(([icon, label, active, screen]) => (
            <button key={label} onClick={() => screen && navigate(screen)} style={{
              flex: 1, flexDirection: "column", display: "flex", alignItems: "center",
              gap: 2, background: "none", border: "none", cursor: "pointer",
              color: active ? TC.primary : TC.textLight,
            }}>
              <span style={{ fontSize: 20 }}>{icon}</span>
              <span style={{ fontSize: 10, fontWeight: active ? 800 : 500 }}>{label}</span>
            </button>
          ))}
        </div>
      </div>
    );

    const TGroupImportScreen = ({ navigate }) => {
      const [sel, setSel] = useState([0]);
      const cats = [
        { name: "Equipos Proyecto Final", n: 10, m: 40, sync: "Nunca" },
        { name: "Grupos de Estudio", n: 5, m: 20, sync: "Hace 3 días" },
        { name: "Laboratorio DevOps", n: 4, m: 16, sync: "Hace 1 semana" },
      ];
      return (
        <div style={{ ...phoneStyle(TC) }}>
          <div style={{ background: TC.primary }}>
            <StatusBar dark />
            <div style={{ padding: "8px 20px 20px", color: "#fff" }}>
              <button onClick={() => navigate("tDashboard")} style={{ background: "rgba(255,255,255,0.15)", border: "none", borderRadius: 10, padding: "6px 12px", color: "#fff", cursor: "pointer", marginBottom: 10, fontSize: 13 }}>← Volver</button>
              <div style={{ fontSize: 20, fontWeight: 900 }}>Importar desde Brightspace</div>
              <div style={{ fontSize: 12, opacity: 0.65, marginTop: 3 }}>Gestión de Proyectos 2026-10</div>
            </div>
          </div>
          <div style={{ ...scrollable, padding: 16 }}>
            <TCard style={{ marginBottom: 16, background: `${TC.surfaceAlt}` }}>
              <div style={{ fontSize: 12, color: TC.textMid }}>🔵 Conectado a Brightspace · 3 categorías disponibles</div>
            </TCard>
            {cats.map((c, i) => (
              <TCard key={i} style={{ marginBottom: 12, border: sel.includes(i) ? `2px solid ${TC.primary}` : `1px solid ${TC.border}`, cursor: "pointer" }}
                onClick={() => setSel(prev => prev.includes(i) ? prev.filter(x => x !== i) : [...prev, i])}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{
                    width: 22, height: 22, borderRadius: 7,
                    background: sel.includes(i) ? TC.primary : TC.border,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    flexShrink: 0,
                  }}>{sel.includes(i) && <span style={{ color: "#fff", fontSize: 13 }}>✓</span>}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 800, fontSize: 14, color: TC.text }}>{c.name}</div>
                    <div style={{ fontSize: 11, color: TC.textMid }}>{c.n} grupos · {c.m} estudiantes</div>
                  </div>
                  <div>
                    <div style={{ fontSize: 10, color: TC.textLight }}>Última sync</div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: c.sync === "Nunca" ? TC.danger : TC.success }}>{c.sync}</div>
                  </div>
                </div>
              </TCard>
            ))}
            <div style={{ marginTop: 8 }}>
              <TBtn label={`Importar ${sel.length} categoría${sel.length !== 1 ? "s" : ""} →`} full onClick={() => navigate("tDashboard")} />
            </div>
            <div style={{ fontSize: 11, color: TC.textLight, textAlign: "center", marginTop: 10 }}>
              Los datos se sincronizarán con Roble
            </div>
          </div>
        </div>
      );
    };

    const TNewAssessmentScreen = ({ navigate }) => {
      const [vis, setVis] = useState("public");
      const [hours, setHours] = useState("72");
      return (
        <div style={{ ...phoneStyle(TC) }}>
          <div style={{ background: TC.primary }}>
            <StatusBar dark />
            <div style={{ padding: "8px 20px 20px", color: "#fff" }}>
              <button onClick={() => navigate("tDashboard")} style={{ background: "rgba(255,255,255,0.15)", border: "none", borderRadius: 10, padding: "6px 12px", color: "#fff", cursor: "pointer", marginBottom: 10, fontSize: 13 }}>← Volver</button>
              <div style={{ fontSize: 20, fontWeight: 900 }}>Nueva Evaluación</div>
            </div>
          </div>
          <div style={{ ...scrollable, padding: 16 }}>
            <TCard style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: TC.textMid, marginBottom: 8 }}>NOMBRE</div>
              <div style={{ padding: "11px 14px", borderRadius: 12, border: `1.5px solid ${TC.primary}`, fontSize: 14, fontWeight: 700, color: TC.text }}>
                Evaluación Semana 6
              </div>
            </TCard>
            <TCard style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: TC.textMid, marginBottom: 8 }}>CATEGORÍA DE GRUPOS</div>
              <div style={{ padding: "11px 14px", borderRadius: 12, border: `1px solid ${TC.border}`, fontSize: 14, color: TC.text, background: TC.surfaceAlt }}>
                Equipos Proyecto Final ▼
              </div>
            </TCard>
            <TCard style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: TC.textMid, marginBottom: 8 }}>VENTANA DE TIEMPO</div>
              <div style={{ display: "flex", gap: 8 }}>
                {["24", "48", "72", "168"].map(h => (
                  <button key={h} onClick={() => setHours(h)} style={{
                    flex: 1, padding: "9px 0", borderRadius: 11,
                    background: hours === h ? TC.primary : TC.surfaceAlt,
                    color: hours === h ? "#fff" : TC.textMid,
                    border: "none", cursor: "pointer", fontWeight: 700, fontSize: 12,
                  }}>{h}h</button>
                ))}
              </div>
            </TCard>
            <TCard style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: TC.textMid, marginBottom: 8 }}>VISIBILIDAD</div>
              {[
                { val: "public", icon: "👥", label: "Pública", desc: "Estudiantes ven sus promedios" },
                { val: "private", icon: "🔒", label: "Privada", desc: "Solo el docente ve resultados" },
              ].map(opt => (
                <div key={opt.val} onClick={() => setVis(opt.val)} style={{
                  display: "flex", alignItems: "center", gap: 12,
                  padding: "12px", borderRadius: 14, cursor: "pointer", marginBottom: 8,
                  background: vis === opt.val ? `${TC.primary}12` : TC.surfaceAlt,
                  border: `1.5px solid ${vis === opt.val ? TC.primary : TC.border}`,
                }}>
                  <span style={{ fontSize: 22 }}>{opt.icon}</span>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 13, color: TC.text }}>{opt.label}</div>
                    <div style={{ fontSize: 11, color: TC.textMid }}>{opt.desc}</div>
                  </div>
                </div>
              ))}
            </TCard>
            <TBtn label="🚀 Lanzar evaluación" full onClick={() => navigate("tDashboard")} />
          </div>
        </div>
      );
    };

    const TResultsScreen = ({ navigate }) => {
      const [drill, setDrill] = useState(null);
      const groups = [
        { name: "Equipo DevOps 1", avg: 4.3, punct: 4.5, contrib: 4.2, commit: 4.4, attitude: 4.1 },
        { name: "Equipo DevOps 2", avg: 3.5, punct: 3.0, contrib: 3.8, commit: 3.4, attitude: 3.8 },
        { name: "Equipo DevOps 3", avg: 4.7, punct: 4.8, contrib: 4.6, commit: 4.7, attitude: 4.7 },
      ];
      const g = drill !== null ? groups[drill] : null;
      return (
        <div style={{ ...phoneStyle(TC) }}>
          <div style={{ background: TC.primary }}>
            <StatusBar dark />
            <div style={{ padding: "8px 20px 20px", color: "#fff" }}>
              <button onClick={() => drill !== null ? setDrill(null) : navigate("tDashboard")} style={{ background: "rgba(255,255,255,0.15)", border: "none", borderRadius: 10, padding: "6px 12px", color: "#fff", cursor: "pointer", marginBottom: 10, fontSize: 13 }}>← Volver</button>
              <div style={{ fontSize: 20, fontWeight: 900 }}>{g ? g.name : "Resultados Globales"}</div>
              <div style={{ fontSize: 11, opacity: 0.65 }}>Evaluación Semana 6 · {g ? "Desglose por criterio" : "Todos los grupos"}</div>
            </div>
          </div>
          <div style={{ ...scrollable, padding: 16 }}>
            {!g ? (
              <>
                <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
                  {[["4.2", "Promedio", TC.accent], ["75%", "Completitud", TC.success]].map(([v, l, c]) => (
                    <TCard key={l} style={{ flex: 1, textAlign: "center" }}>
                      <div style={{ fontSize: 26, fontWeight: 900, color: c }}>{v}</div>
                      <div style={{ fontSize: 11, color: TC.textMid }}>{l}</div>
                    </TCard>
                  ))}
                </div>
                <div style={{ fontWeight: 700, fontSize: 13, color: TC.textMid, marginBottom: 10 }}>GRUPOS — toca para detalle</div>
                {groups.map((grp, i) => (
                  <TCard key={i} style={{ marginBottom: 12, cursor: "pointer" }} onClick={() => setDrill(i)}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                      <div style={{ fontWeight: 800, fontSize: 14, color: TC.text }}>{grp.name}</div>
                      <div style={{
                        background: grp.avg >= 4 ? `${TC.success}20` : `${TC.warning}20`,
                        color: grp.avg >= 4 ? TC.success : TC.warning,
                        borderRadius: 10, padding: "4px 12px", fontWeight: 900, fontSize: 16,
                      }}>{grp.avg}</div>
                    </div>
                    <CriterionBar label="Puntualidad" value={grp.punct} color={TC.accent} />
                    <CriterionBar label="Compromiso" value={grp.commit} color={TC.primary} />
                  </TCard>
                ))}
              </>
            ) : (
              <>
                <TCard style={{ textAlign: "center", marginBottom: 14 }}>
                  <div style={{ fontSize: 42, fontWeight: 900, color: TC.primary }}>{g.avg}</div>
                  <div style={{ fontSize: 13, color: TC.textMid }}>Promedio del grupo</div>
                </TCard>
                <TCard style={{ marginBottom: 14 }}>
                  <div style={{ fontWeight: 800, fontSize: 14, color: TC.text, marginBottom: 14 }}>Criterios</div>
                  <CriterionBar label="Puntualidad" value={g.punct} color="#06B6D4" />
                  <CriterionBar label="Contribuciones" value={g.contrib} color={TC.primaryLight} />
                  <CriterionBar label="Compromiso" value={g.commit} color="#22C55E" />
                  <CriterionBar label="Actitud" value={g.attitude} color={TC.accent} />
                </TCard>
                <div style={{ fontWeight: 700, fontSize: 13, color: TC.textMid, marginBottom: 10 }}>ESTUDIANTES</div>
                {["L. Pérez", "R. Sánchez", "M. Díaz", "C. Ruíz"].map((s, i) => (
